<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>University Course Registration System (UCRS) Readiness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; }
      .badge { display:inline-block; padding:6px 10px; border-radius:8px; }
      .ready { background:#e6ffed; }
      .blocked { background:#ffe6e6; }
      .banner { margin-top:12px; padding:8px 12px; border:1px solid #ccc; border-radius:8px; display:none; }
    </style>
  </head>
  <body>
    <h1>University Course Registration System (UCRS) Readiness</h1>
    <div id="badge" class="badge" data-testid="readiness-badge">…</div>
    <div id="reason" data-testid="readiness-reason" style="margin-top:8px; display:none;"></div>

    <div style="margin-top:16px;">
      <button id="enrol" data-testid="btn-enrol" disabled>Enrol</button>
      <button id="fix" data-testid="btn-fix">Fix</button>
    </div>

    <div id="banner" class="banner" data-testid="banner-success">Ready</div>

    <script src="/static/app.js"></script>
  </body>
</html>
